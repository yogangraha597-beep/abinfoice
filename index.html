<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LAZ Al Bunyan</title>
    <style>
        /* Pengaturan Dasar & Font */
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #f8fafc;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* elemen Dekorasi Aksen Blob (Sesuai Gambar) */
        .bg-decorations {
            position: absolute;
            width: 600px;
            height: 600px;
            z-index: 1;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: translate(120px, 10px);
        }

        /* Kartu Login Utama */
        .login-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 420px;
            padding: 45px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            z-index: 2;
            text-align: center;
            position: relative;
        }

        /* Logo Lingkaran Cyan */
        .logo-circle {
            width: 40px;
            height: 40px;
            border: 7px solid #67e8f9;
            border-radius: 50%;
            margin: 0 auto 15px auto;
        }

        .login-card h2 {
            margin: 0 0 40px 0;
            font-size: 28px;
            color: #0f172a;
            font-weight: 700;
        }

        /* Group Input Baris */
        .input-group {
            position: relative;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #cbd5e1;
            padding-bottom: 8px;
            transition: border-color 0.3s;
        }

        .input-group:focus-within {
            border-bottom: 2px solid #2563eb;
        }

        /* Icon di dalam Input */
        .input-icon {
            width: 20px;
            height: 20px;
            color: #94a3b8;
            margin-right: 15px;
            flex-shrink: 0;
            transition: color 0.3s;
        }

        .input-group:focus-within .input-icon {
            color: #2563eb;
        }

        /* Kolom Input Text & Password */
        .input-field {
            width: 100%;
            border: none;
            outline: none;
            font-size: 15px;
            color: #334155;
            background: transparent;
            padding: 2px 0;
        }

        .input-field::placeholder {
            color: #94a3b8;
        }

        /* Tombol Login Biru Cerah */
        .btn-login {
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            margin-bottom: 25px;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-login:hover {
            background-color: #1d4ed8;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        /* Link Alternatif & Muted Text */
        .signup-link {
            display: block;
            color: #2563eb;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            margin-bottom: 40px;
        }

        .signup-link:hover {
            text-decoration: underline;
        }

        .forgot-text {
            color: #94a3b8;
            font-size: 13px;
            text-decoration: none;
            display: inline-block;
        }

        .forgot-text:hover {
            color: #64748b;
        }
    </style>
</head>
<body>

    <!-- Aksen Vektor Dekorasi Latar Belakang (Sesuai Gambar) -->
    <div class="bg-decorations">
        <svg viewBox="0 0 500 500" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            <!-- Blob Tosca / Cyan Belakang -->
            <path fill="#a5f3fc" d="M400,290Q360,380,270,410Q180,440,140,340Q100,240,160,150Q220,60,320,100Q420,140,400,290Z" />
            <!-- Blob Biru Utama -->
            <path fill="#1d4ed8" d="M330,320Q260,420,160,380Q60,340,90,230Q120,120,220,110Q320,100,360,200Q400,300,330,320Z" />
            <!-- Garis Tipis Kuning Mas -->
            <path stroke="#face16" stroke-width="2" fill="none" d="M370,330Q310,440,200,410Q90,380,110,250Q130,120,250,130Q370,140,410,230Q450,320,370,330Z" />
        </svg>
    </div>

    <!-- Form Login Model Card -->
<div class="login-card">
    <!-- Ganti bulatan dengan logo milikmu -->
    <img src="Logo.png" alt="Logo" style="width: 160px; height: auto; margin-bottom: 20px;">
    
    
        <h2>Login</h2>

        <form id="loginForm" onsubmit="prosesLogin(event)">
            <!-- Input Email / Username -->
            <div class="input-group">
                <!-- Icon Amplop SVG -->
                <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
                <input type="text" id="username" class="input-field" placeholder="username atau email" required>
            </div>

            <!-- Input Password -->
            <div class="input-group">
                <!-- Icon Gembok SVG -->
                <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
                <input type="password" id="password" class="input-field" placeholder="password" required>
            </div>

            <!-- Tombol Aksi -->
            <button type="submit" class="btn-login">Login</button>
        </form>

        <a href="#" class="signup-link">or Sign Up</a>
        <a href="#" class="forgot-text">forgot password?</a>
    </div>

    <!-- Script Kontrol Navigasi -->
    <script>
        function prosesLogin(event) {
            event.preventDefault(); // Mencegah reload halaman secara paksa
            
            let user = document.getElementById('username').value.trim();
            let pass = document.getElementById('password').value.trim();

            // Validasi sederhana (Bisa diisi apa saja untuk uji coba)
            if(user !== "" && pass !== "") {
                // Alihkan langsung secara halus menuju halaman dashboard rekap
                window.location.href = "dashboard.html";
            } else {
                alert("Mohon isi username dan password Anda.");
            }
        }
    </script>
</body>
</html>
