<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LAZ Al Bunyan</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f3fbfb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
            overflow: hidden;
        }

        /* Dekorasi Elemen Grafis Abstrak di Belakang Card (Sisi Kanan) */
        .bg-decoration {
            position: absolute;
            right: -100px;
            top: 50%;
            transform: translateY(-50%);
            width: 500px;
            height: 500px;
            z-index: 1;
            pointer-events: none;
        }
        .shape-light-blue {
            position: absolute;
            width: 320px;
            height: 420px;
            background-color: #bbf7f5;
            border-radius: 43% 57% 64% 36% / 44% 39% 61% 56%;
            opacity: 0.8;
            right: 40px;
            top: 20px;
        }
        .shape-dark-blue {
            position: absolute;
            width: 140px;
            height: 280px;
            background-color: #1d4ed8;
            border-radius: 50% 50% 48% 52% / 61% 58% 42% 39%;
            right: 140px;
            top: 90px;
        }
        .shape-yellow-line {
            position: absolute;
            width: 330px;
            height: 430px;
            border: 2px solid #facc15;
            border-radius: 41% 59% 40% 60% / 55% 45% 55% 45%;
            right: 20px;
            top: 15px;
        }

        /* Login Card */
        .login-card {
            background-color: #ffffff;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 440px;
            box-sizing: border-box;
            text-align: center;
            z-index: 2;
            position: relative;
        }

        .logo-container {
            margin-bottom: 25px;
        }

        .logo-container img {
            max-width: 160px;
            height: auto;
        }

        .login-card h2 {
            margin: 0 0 35px 0;
            color: #0f172a;
            font-size: 28px;
            font-weight: 700;
        }

        /* Input Group Minimalis (Hanya Garis Bawah) */
        .input-group {
            margin-bottom: 28px;
            position: relative;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            padding: 12px 10px 12px 38px;
            border: none;
            border-bottom: 1px solid #cbd5e1;
            font-size: 15px;
            color: #334155;
            outline: none;
            box-sizing: border-box;
            background: transparent;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-bottom-color: #2563eb;
        }

        /* Placeholder Styling */
        .input-group input::placeholder {
            color: #94a3b8;
        }

        /* Ikon Kontur di Sisi Kiri Input */
        .input-icon {
            position: absolute;
            left: 5px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: #64748b;
            pointer-events: none;
        }

        /* Tombol Modern */
        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 15px;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .btn-login:hover {
            background-color: #1d4ed8;
        }

        .btn-login:disabled {
            background-color: #93c5fd;
            cursor: not-allowed;
        }

        /* Tautan Pendukung */
        .links-container {
            margin-top: 25px;
            font-size: 14px;
        }

        .link-signup {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 30px;
        }

        .link-signup:hover {
            text-decoration: underline;
        }

        .link-forgot {
            color: #94a3b8;
            text-decoration: none;
            font-size: 13px;
            display: block;
        }

        .link-forgot:hover {
            color: #64748b;
        }

        /* Notifikasi Pesan Error */
        .pesan-error {
            color: #ef4444;
            font-size: 13px;
            margin-top: 15px;
            font-weight: 600;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Komponen Dekorasi Latar Belakang -->
    <div class="bg-decoration">
        <div class="shape-light-blue"></div>
        <div class="shape-dark-blue"></div>
        <div class="shape-yellow-line"></div>
    </div>

    <!-- Kotak Utama Login -->
    <div class="login-card">
        <div class="logo-container">
            <!-- Memakai logo.png yang sudah ada di direktori lokal Anda -->
            <img src="logo.png" alt="Logo LAZ Al Bunyan">
        </div>
        
        <h2>Login</h2>
        
        <form id="formLogin" onsubmit="eksekusiLogin(event)">
            <!-- Input Username dengan Ikon Amplop -->
            <div class="input-group">
                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25H4.5A2.25 2.25 0 0 1 2.25 17.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5H4.5a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
                </svg>
                <input type="text" id="username" placeholder="admin" required>
            </div>
            
            <!-- Input Password dengan Ikon Gembok -->
            <div class="input-group">
                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                </svg>
                <input type="password" id="password" placeholder="password" required>
            </div>
            
            <button type="submit" class="btn-login" id="tombolSubmit">Login</button>
            <div id="boxError" class="pesan-error"></div>
        </form>

        <div class="links-container">
            <a href="#" class="link-signup">or Sign Up</a>
            <a href="#" class="link-forgot">forgot password?</a>
        </div>
    </div>

    <script>
        // TETAP DISINKRONKAN DENGAN URL APPS SCRIPT ANDA
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyWUi5LevSyzNrf6cYnfWMHX7horHvRrhpz8k7_54iNty8wgq_OG-I__Mj4xRNWtiYS8Q/exec';

        async function eksekusiLogin(e) {
            e.preventDefault();
            
            let user = document.getElementById('username').value;
            let pass = document.getElementById('password').value;
            let boxError = document.getElementById('boxError');
            let btn = document.getElementById('tombolSubmit');

            boxError.style.display = "none";
            btn.innerText = "Memverifikasi...";
            btn.disabled = true;

            try {
                let respon = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "login",
                        username: user,
                        password: pass
                    })
                });
                
                let hasil = await respon.json();
                
                if (hasil.status === "sukses") {
                    localStorage.setItem("isLoggedIn", "true");
                    window.location.href = "dashboard.html";
                } else {
                    boxError.innerText = hasil.pesan;
                    boxError.style.display = "block";
                    btn.innerText = "Login";
                    btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                boxError.innerText = "Gagal terhubung ke server cloud Apps Script!";
                boxError.style.display = "block";
                btn.innerText = "Login";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
